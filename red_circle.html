<!DOCTYPE html>
<html>
<head>
  <title>jsPsych Red Circle</title>
  <!-- jsPsych core library (v7.3.4) -->
  <script src="https://unpkg.com/jspsych@7.3.4"></script>
  <!-- html-keyboard-response plugin -->
  <script src="https://unpkg.com/@jspsych/plugin-html-keyboard-response@1.1.3"></script>
  <!-- jsPsych default CSS -->
  <link href="https://unpkg.com/jspsych@7.3.4/css/jspsych.css" rel="stylesheet" type="text/css" />
  <style>
    /* 1. Set background color to gray */
    body {
      background-color: #808080;
      color: white; /* Ensure text is readable on gray background */
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    /* 2. CSS to draw a 100px red circle */
    .red-circle {
      width: 100px;
      height: 100px;
      background-color: #ff0000; /* Red */
      border-radius: 50%;        /* Circular shape */
      margin: 20px auto;
    }

    /* Override jsPsych default background to match body */
    .jspsych-display-element {
      background-color: #808080;
      color: white;
    }
  </style>
</head>
<body>
  <div id="jspsych-target"></div>

  <script>
    /**
     * jsPsych Experiment: Red Circle Display
     */

    // Initialize jsPsych
    const jsPsych = initJsPsych({
      on_finish: function() {
        // Log data to console for review
        console.log("Experiment finished.");
      }
    });

    const timeline = [];

    // Instruction / Start screen
    const welcome = {
      type: jsPsychHtmlKeyboardResponse,
      stimulus: `
        <div style="font-family: sans-serif;">
          <h1>実験を開始します</h1>
          <p>準備ができたら、何かキーを押してください。</p>
        </div>
      `
    };
    timeline.push(welcome);

    // Red circle trial
    const circle_trial = {
      type: jsPsychHtmlKeyboardResponse,
      stimulus: `
        <div>
          <div class="red-circle"></div>
          <p style="font-family: sans-serif; margin-top: 20px;">
            スペースキーを押すと終了します
          </p>
        </div>
      `,
      choices: [' '], // Listen only for the space key
      data: {
        task: 'red_circle_test'
      }
    };
    timeline.push(circle_trial);

    // Ending message
    const end_message = {
      type: jsPsychHtmlKeyboardResponse,
      stimulus: `
        <div style="font-family: sans-serif;">
          <p>終了しました。ご協力ありがとうございました。</p>
        </div>
      `,
      choices: "NO_KEYS",
      trial_duration: 3000
    };
    timeline.push(end_message);

    // Run the experiment
    jsPsych.run(timeline);
  </script>
</body>
</html>
