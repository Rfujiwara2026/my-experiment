<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>心理学実験室</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #f3f4f6; /* 薄いグレー */
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
        }

        .container {
            text-align: center;
            padding: 2rem;
        }

        h1 {
            font-size: 3rem;
            font-weight: bold;
            color: #1f2937;
            margin-bottom: 2rem;
        }

        .start-button {
            background-color: #3b82f6; /* 青色 */
            color: white;
            padding: 1rem 2.5rem;
            font-size: 1.25rem;
            font-weight: 600;
            border: none;
            border-radius: 0.5rem;
            cursor: pointer;
            transition: background-color 0.3s, transform 0.1s;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }

        .start-button:hover {
            background-color: #2563eb;
        }

        .start-button:active {
            transform: scale(0.98);
        }

        /* カスタムメッセージボックス（alert()の代わり） */
        #message-box {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            padding: 2rem;
            border-radius: 1rem;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
            z-index: 1000;
            text-align: center;
            min-width: 300px;
        }

        #overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.4);
            z-index: 999;
        }

        .close-button {
            margin-top: 1.5rem;
            background-color: #4b5563;
            color: white;
            padding: 0.5rem 1.5rem;
            border-radius: 0.375rem;
            cursor: pointer;
            border: none;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>心理学実験室へようこそ</h1>
        <button id="startButton" class="start-button">実験を開始する</button>
    </div>

    <!-- モーダル（アラートの代わり） -->
    <div id="overlay"></div>
    <div id="message-box">
        <p id="message-text" style="font-size: 1.5rem; color: #111827;"></p>
        <button class="close-button" onclick="closeAlert()">閉じる</button>
    </div>

    <script>
        const startButton = document.getElementById('startButton');
        const overlay = document.getElementById('overlay');
        const messageBox = document.getElementById('message-box');
        const messageText = document.getElementById('message-text');

        // 実験開始ボタンのクリックイベント
        startButton.addEventListener('click', () => {
            showAlert('Hello World!');
        });

        // カスタムアラート表示関数
        function showAlert(text) {
            messageText.textContent = text;
            overlay.style.display = 'block';
            messageBox.style.display = 'block';
        }

        // アラートを閉じる関数
        function closeAlert() {
            overlay.style.display = 'none';
            messageBox.style.display = 'none';
        }

        // 背景クリックでも閉じられるように設定
        overlay.addEventListener('click', closeAlert);
    </script>
</body>
</html>
